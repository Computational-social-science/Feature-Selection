project:
  name: "Feature Selection Factory"
  version: "1.0.0"

# ... (dsl, sandbox 等其他配置保持不变) ...

# LLM 配置 (修改为纯本地)
llm:
  provider: "vllm"  # 默认使用 vllm
  
  vllm:
    # 👇 请在这里填入您服务器上的真实路径，以后就不用每次敲命令了
    model_path: "../../../data1/fangsensen/deepseek-math-7b-rl"
    gpu_memory_utilization: 0.9
    max_tokens: 2048
    temperature: 0.9

  # API 配置 (留空或忽略即可)
  deepseek:
    api_key_env: "DEEPSEEK_API_KEY"